<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Heaven Studios - Documentación</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Documentación oficial de los plugins de Minecraft de Heaven Studios">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" type="image/webp" href="heavenstudios.webp">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #3d5a94;
      --base-font-size: 15px;
      --content-max-width: 62em;

      --cover-background-color: radial-gradient(ellipse at 40% 10%, #243859 0%, #0c1220 60%);
      --cover-heading-color: #a8c0e8;
      --cover-button-border: 1px solid #3d5a94;
      --cover-button-color: #fff;
      --cover-button-primary-background: #3d5a94;
      --cover-button-primary-color: #fff;

      --sidebar-name-color: #a8c0e8;
      --sidebar-nav-link-color--active: #a8c0e8;
      --sidebar-nav-link-border-color--active: #3d5a94;
      --sidebar-nav-pagelink-background-color: rgba(61, 90, 148, 0.15);

      --link-color: #84a3d8;
      --link-color--hover: #aac1e8;
      --heading-h2-border-color: rgba(61, 90, 148, 0.45);
      --code-theme-background: #131b2c;
      --table-row-odd-background: rgba(61, 90, 148, 0.07);
      --blockquote-border-color: #3d5a94;
      --search-input-background-color: #131b2c;
      --search-result-heading-color: #a8c0e8;
    }
    .sidebar-nav strong { color: #a8c0e8; letter-spacing: 0.03em; }
    .markdown-section code { border-radius: 4px; }
    /* Logo en la portada */
    section.cover .cover-main img {
      max-width: 170px;
      filter: drop-shadow(0 6px 24px rgba(61, 90, 148, 0.55));
    }
    /* Footer de paginación (Anterior / Siguiente) */
    .docsify-pagination-container {
      border-top: 1px solid rgba(61, 90, 148, 0.35);
      margin-top: 3em;
      padding-top: 1.2em;
    }
    .pagination-item-label {
      color: #84a3d8;
      font-size: 0.85em;
      opacity: 1;
    }
    .pagination-item-label svg { stroke: #84a3d8; }
    .pagination-item-title {
      color: #a8c0e8;
      font-size: 1.25em;
      opacity: 1;
    }
    .pagination-item:hover .pagination-item-title {
      color: #ffffff;
      text-decoration: none;
    }
    .pagination-item:hover .pagination-item-label,
    .pagination-item:hover .pagination-item-label svg {
      color: #aac1e8;
      stroke: #aac1e8;
    }
  </style>
</head>
<body>
  <div id="app">Cargando documentación...</div>
  <script>
    window.$docsify = {
      name: 'Heaven Studios',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      coverpage: true,
      onlyCover: false,
      subMaxLevel: 2,
      auto2top: true,
      executeScript: false,
      search: {
        placeholder: '🔍 Buscar...',
        noData: 'Sin resultados',
        depth: 6
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Siguiente',
        crossChapter: true,
        crossChapterText: false
      },
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Error',
        successText: '¡Copiado!'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
</body>
</html>
